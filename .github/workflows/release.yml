name: Build & Release (main branch only)

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.set_version.outputs.VERSION }}
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r27c
          cache-key: android-sdk

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: android-r27c-arm
          cache-on-failure: true

      - name: Install build-tools 34.0.0 (for apksigner - PKCS12 support)
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"

      - name: Install build-tools 29.0.3 (for zipalign)
        run: |
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      - name: Install dependencies
        run: bun install

      - name: Build Next.js (for Android)
        run: bun run build

      - name: Setup sccache
        uses: Mozilla-Actions/sccache-action@v0.0.10
        with:
          version: "latest"

      - name: Build Android APK
        run: bash scripts/android.sh build --ci
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          
      - name: Find APK/AAB output
        run: |
          echo "Searching for APK/AAB files..."
          find src-tauri/gen/android -name "*.apk" -o -name "*.aab" | head -20
          find src-tauri/target -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: src-tauri/gen/android/app/build/outputs/apk/universal/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Prepare signed APK for release
        id: set_version
        run: |
          # Find the signed APK
          SIGNED_APK=$(find . -name "*unsigned-signed.apk" | head -1)
          if [ -z "$SIGNED_APK" ]; then
            echo "No signed APK found"
            exit 1
          fi
          echo "Found signed APK: $SIGNED_APK"
          
          # Get version from package.json (use as-is)
          VERSION=$(node -e "const p=require('./package.json'); console.log(p.version)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Copy and rename
          mkdir -p release-apk
          cp "$SIGNED_APK" "release-apk/drugucopia-mobile-${VERSION}.apk"
          echo "Created: release-apk/drugucopia-mobile-${VERSION}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            release-apk/*.apk
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: android-build

      - name: Extract Changelog
        id: changelog
        run: |
          VERSION="${{ needs.build-android.outputs.VERSION }}"
          CHANGELOG=$(node scripts/extract-changelog.js "$VERSION")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-android.outputs.VERSION || '1.0.0' }}
          name: Release v${{ needs.build-android.outputs.VERSION || '1.0.0' }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            android-build/**
          token: ${{ secrets.GITHUB_TOKEN }}
